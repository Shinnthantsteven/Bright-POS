<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bright — All-in-One</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sb:#111110;--sb3:#2a2924;
  --acc:#f5a623;--acc2:#d97706;--al:#fef3c7;--at:#92400e;
  --sur:#fff;--sur2:#fafaf8;--sur3:#f0ede6;
  --tx1:#111110;--tx2:#52504a;--tx3:#9b9890;--brd:#e8e4da;
  --g:#22c55e;--r:#ef4444;--b:#3b82f6;--p:#8b5cf6;--teal:#0d9488;
  font-family:'DM Sans',sans-serif;
}
body{background:var(--sur2);overflow:hidden}
.app{display:grid;grid-template-columns:64px 1fr;height:100vh}
.sb{background:var(--sb);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:1px;overflow:hidden}
.logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:8px;flex-shrink:0;cursor:pointer}
.logo-text{font-size:9px;font-weight:700;color:#f5a623;letter-spacing:0.8px;margin-top:1px}
.sbb{width:46px;height:42px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:none;background:transparent;color:#6b6860;transition:all .15s;flex-shrink:0}
.sbb svg{width:16px;height:16px}
.sbb span{font-size:8.5px;letter-spacing:.3px;line-height:1}
.sbb:hover{background:var(--sb3);color:#d4cfbf}
.sbb.on{background:var(--acc);color:#111}
.sbsep{width:30px;height:1px;background:rgba(255,255,255,.07);margin:3px 0;flex-shrink:0}
.sbot{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:1px}
.main{display:flex;flex-direction:column;overflow:hidden}
.tb{height:50px;background:var(--sur);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.tbr{margin-left:auto;display:flex;align-items:center;gap:8px}
.ct{flex:1;overflow-y:auto;padding:16px}
.chip{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--brd);background:var(--sur2);color:var(--tx2);cursor:pointer;transition:all .12s}
.chip:hover{border-color:var(--acc);color:var(--at)}
.chip.on{background:var(--acc);color:#111;border-color:var(--acc);font-weight:600}
.pn{background:var(--sur);border:1px solid var(--brd);border-radius:12px;overflow:hidden}
.ph{padding:12px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.ph h3{font-size:13px;font-weight:600;color:var(--tx1)}
.ph .se{font-size:12px;color:var(--at);cursor:pointer;font-weight:500}
.btn{padding:7px 14px;border-radius:8px;border:1px solid var(--brd);background:var(--sur2);cursor:pointer;font-size:12px;font-weight:500;color:var(--tx2);transition:all .12s}
.btn:hover{background:var(--sur3)}
.btn.pr{background:var(--acc);color:#111;border-color:var(--acc);font-weight:600}
.btn.pr:hover{background:var(--acc2)}
.btn.sm{padding:5px 10px;font-size:11px}
.pill{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;display:inline-block}
.p-green{background:#dcfce7;color:#15803d}
.p-amber{background:#fef3c7;color:#a16207}
.p-red{background:#fee2e2;color:#b91c1c}
.p-blue{background:#dbeafe;color:#1e40af}
.p-purple{background:#f3e8ff;color:#7e22ce}
.p-gray{background:var(--sur3);color:var(--tx2)}
.sg{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.sc{background:var(--sur);border:1px solid var(--brd);border-radius:12px;padding:14px;position:relative;overflow:hidden}
.sc.hl{background:var(--acc);border-color:var(--acc)}
.sc .lb{font-size:10px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.sc.hl .lb{color:rgba(17,17,16,.5)}
.sc .vl{font-size:22px;font-weight:700;color:var(--tx1);letter-spacing:-0.5px;font-family:'DM Mono',monospace}
.sc .s2{font-size:10px;color:var(--tx3);margin-top:3px}
.sc.hl .s2,.sc.hl .vl{color:#111}
.sc .dt{position:absolute;top:12px;right:12px;width:7px;height:7px;border-radius:50%}
.floor-wrap{display:grid;grid-template-columns:1fr 320px;gap:14px;height:calc(100vh - 100px)}
.floor-canvas{background:var(--sur);border:1px solid var(--brd);border-radius:12px;position:relative;overflow:hidden}
.zone-label{position:absolute;font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px}
.tbl{position:absolute;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;border-radius:50%;border:2px solid var(--brd);background:var(--sur2);transition:all .15s;user-select:none}
.tbl:hover{border-color:var(--acc);transform:scale(1.05)}
.tbl .tn{font-size:11px;font-weight:700;color:var(--tx1)}
.tbl .tc2{font-size:9px;color:var(--tx3)}
.tbl.occ{background:#fef3c7;border-color:#fcd34d}
.tbl.occ .tn{color:#92400e}
.tbl.res{background:#dbeafe;border-color:#93c5fd}
.tbl.res .tn{color:#1e40af}
.tbl.dirty{background:#fee2e2;border-color:#fca5a5}
.tbl.active{background:#f5a623;border-color:#d97706}
.tbl.active .tn,.tbl.active .tc2{color:#111}
.tbl-rect{border-radius:8px}
.bar-counter{position:absolute;background:#1a1410;border-radius:8px;display:flex;align-items:center;justify-content:center}
.bar-counter span{font-size:10px;font-weight:700;color:#f5a623;letter-spacing:.5px}
.zone-dining{position:absolute;background:rgba(245,166,35,0.04);border:1px dashed rgba(245,166,35,0.2);border-radius:8px}
.zone-bar{position:absolute;background:rgba(17,17,16,0.04);border:1px dashed rgba(0,0,0,0.15);border-radius:8px}
.zone-lounge{position:absolute;background:rgba(59,130,246,0.04);border:1px dashed rgba(59,130,246,0.2);border-radius:8px}
.zone-private{position:absolute;background:rgba(139,92,246,0.04);border:1px dashed rgba(139,92,246,0.2);border-radius:8px}
.order-panel{background:var(--sur);border:1px solid var(--brd);border-radius:12px;display:flex;flex-direction:column;overflow:hidden}
.oh{padding:10px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.oh h3{font-size:13px;font-weight:600;color:var(--tx1)}
.osrc{display:flex;gap:5px;padding:7px 12px;border-bottom:1px solid var(--brd)}
.sb4{flex:1;padding:5px;border-radius:7px;border:1px solid var(--brd);background:transparent;font-size:11px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .12s;text-align:center}
.sb4.on{background:var(--acc);color:#111;border-color:var(--acc);font-weight:600}
.oil{flex:1;overflow-y:auto}
.oe{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:6px;color:var(--tx3);font-size:12px;text-align:center;padding:20px}
.allergy-banner{background:#450a0a;border:1px solid #7f1d1d;padding:8px 12px;font-size:10px;color:#fca5a5}
.ab-title{font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;color:#fca5a5}
.ab-row{display:flex;gap:4px;align-items:flex-start;margin-bottom:3px}
.ab-cover{font-size:9px;font-weight:700;color:#9b9890;min-width:48px}
.ab-tag{font-size:9px;padding:1px 5px;border-radius:4px;background:#7f1d1d;color:#fca5a5;font-weight:700}
.ab-avoid{font-size:9px;padding:1px 5px;border-radius:4px;background:#451a03;color:#fb923c;font-weight:700}
.course-block{border-bottom:1px solid var(--brd)}
.course-block:last-child{border-bottom:none}
.cb-hd{padding:8px 12px;display:flex;align-items:center;gap:7px;background:var(--sur2);border-bottom:1px solid var(--brd)}
.cb-badge{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;font-family:'DM Mono',monospace}
.cb-p1{background:#dbeafe;color:#1e40af}
.cb-p2{background:#fef3c7;color:#92400e}
.cb-p3{background:#f3e8ff;color:#6d28d9}
.cb-title{font-size:11px;font-weight:700;color:var(--tx2);flex:1;text-transform:uppercase;letter-spacing:.4px}
.ci-row{display:flex;align-items:flex-start;gap:6px;padding:6px 12px;border-bottom:1px solid var(--sur3)}
.ci-row:last-child{border-bottom:none}
.ci-row.fired-item{opacity:.45}
.ci-qty{font-size:12px;font-weight:700;color:var(--acc2);min-width:18px;font-family:'DM Mono',monospace;padding-top:1px}
.ci-main{flex:1;min-width:0}
.ci-nm{font-size:12px;font-weight:600;color:var(--tx1)}
.ci-dest{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:700;display:inline-block;margin-left:4px}
.dest-k{background:#fef3c7;color:#92400e}
.dest-b{background:#dbeafe;color:#1e40af}
.ci-allergy{font-size:9px;padding:1px 5px;border-radius:4px;background:#fee2e2;color:#b91c1c;font-weight:700;margin-left:3px}
.ci-note-input{width:100%;margin-top:3px;padding:3px 6px;border:1px solid var(--brd);border-radius:5px;font-size:10px;color:var(--tx1);background:var(--sur2);font-family:'DM Sans',sans-serif}
.ci-note-input:focus{outline:none;border-color:var(--acc)}
.cb-actions{padding:6px 12px;display:flex;align-items:center;gap:8px;background:var(--sur2);border-top:1px solid var(--brd)}
.cn-input{flex:1;padding:4px 7px;border:1px solid var(--brd);border-radius:5px;font-size:10px;color:var(--tx1);background:var(--sur);font-family:'DM Sans',sans-serif}
.cn-input:focus{outline:none;border-color:var(--acc)}
.fire-btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:6px 12px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:700;transition:all .15s;font-family:'DM Sans',sans-serif;flex-shrink:0}
.fire-btn.ready{background:#16a34a;color:#fff;animation:pulse-g 2s infinite}
.fire-btn.fired{background:#dcfce7;color:#15803d;cursor:default}
@keyframes pulse-g{0%,100%{box-shadow:0 0 0 0 rgba(22,163,74,.4)}50%{box-shadow:0 0 0 4px rgba(22,163,74,0)}}
.fire-all-btn{width:100%;padding:11px;border-radius:9px;border:none;cursor:pointer;font-size:12px;font-weight:700;background:var(--acc);color:#111;transition:all .15s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px}
.fire-all-btn:hover{background:var(--acc2)}
.fire-all-btn:disabled{background:var(--sur3);color:var(--tx3);cursor:default}
.mpicker{border-top:1px solid var(--brd);display:none;background:var(--sur)}
.mpicker.open{display:block}
.mpc-row{display:flex;overflow-x:auto}
.mpc{padding:6px 11px;font-size:10px;font-weight:700;cursor:pointer;color:var(--tx3);border-bottom:2px solid transparent;transition:all .1s;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.mpc.on{color:var(--at);border-bottom-color:var(--acc)}
.mp-mini{display:grid;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:5px;padding:7px}
.mp-mi{padding:6px 4px;border:1px solid var(--brd);border-radius:7px;cursor:pointer;text-align:center;transition:all .1s;background:var(--sur2)}
.mp-mi:hover{border-color:var(--acc);background:var(--al)}
.mp-mi .me{font-size:16px}
.mp-mi .mn{font-size:8px;font-weight:600;color:var(--tx1);margin-top:2px;line-height:1.2}
.mp-mi .mp{font-size:8px;color:var(--tx3);font-family:'DM Mono',monospace}
.mp-mi.sixed{opacity:.5;cursor:not-allowed;background:var(--sur3)}
.mp-mi.sixed:hover{border-color:var(--brd);background:var(--sur3)}
.cover-card{border:1.5px solid var(--brd);border-radius:8px;padding:8px;margin-bottom:6px;background:var(--sur2);transition:border-color .12s}
.cover-card:last-child{margin-bottom:0}
.cover-card.has-guest{border-color:var(--acc);background:var(--al)}
.cover-card.has-allergy{border-left:3px solid #dc2626}
.cc-top{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.cc-num{width:22px;height:22px;border-radius:5px;background:var(--sb);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.cc-nm{font-size:12px;font-weight:600;color:var(--tx1);flex:1}
.gsearch{width:100%;padding:5px 8px;border:1px solid var(--brd);border-radius:6px;font-size:11px;color:var(--tx1);background:var(--sur);font-family:'DM Sans',sans-serif}
.gsearch:focus{outline:none;border-color:var(--acc)}
.gsearch-results{background:var(--sur);border:1px solid var(--brd);border-radius:7px;margin-top:3px;display:none;max-height:140px;overflow-y:auto}
.gsearch-results.open{display:block}
.gsr{display:flex;align-items:center;gap:7px;padding:7px 10px;cursor:pointer;border-bottom:1px solid var(--sur3)}
.gsr:last-child{border-bottom:none}
.gsr:hover{background:var(--al)}
.gsr-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.gsr-nm{font-size:11px;font-weight:600;color:var(--tx1)}
.gsr-sub{font-size:9px;color:var(--tx3)}
.pay-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.pay-modal.open{opacity:1;pointer-events:all}
.pay-box{background:var(--sur);border-radius:16px;padding:24px;width:360px;max-width:90vw}
.pay-box h2{font-size:16px;font-weight:700;color:var(--tx1);margin-bottom:6px}
.pay-box .total{font-size:28px;font-weight:700;color:var(--tx1);font-family:'DM Mono',monospace;margin-bottom:18px}
.pay-methods{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.pay-method{padding:14px;border-radius:10px;border:1.5px solid var(--brd);background:var(--sur2);cursor:pointer;text-align:center;transition:all .15s}
.pay-method:hover{border-color:var(--acc);background:var(--al)}
.pay-method .pm-ico{font-size:22px;margin-bottom:4px}
.pay-method .pm-lbl{font-size:12px;font-weight:700;color:var(--tx1)}
.pay-method .pm-sub{font-size:10px;color:var(--tx3);margin-top:2px}
.pay-room{border:1.5px solid var(--brd);border-radius:9px;padding:10px;margin-bottom:12px}
.pay-room input{width:100%;padding:7px 10px;border:1px solid var(--brd);border-radius:7px;font-size:12px;color:var(--tx1);background:var(--sur2);margin-top:6px;font-family:'DM Sans',sans-serif}
.pay-room input:focus{outline:none;border-color:var(--acc)}
.hotel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.rcd{background:var(--sur);border:1px solid var(--brd);border-radius:12px;overflow:hidden;transition:all .12s}
.rcd:hover{border-color:var(--acc)}
.rh{padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.rnum{font-size:15px;font-weight:700;color:var(--tx1);letter-spacing:-.3px}
.rtp{font-size:10px;color:var(--tx3);margin-top:1px;font-weight:500}
.rb{padding:10px 14px;border-top:1px solid var(--brd)}
.av{width:30px;height:30px;border-radius:50%;background:var(--al);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--at);flex-shrink:0}
.rc-folio{background:var(--sur2);padding:8px 14px;border-top:1px solid var(--brd);font-size:10px;color:var(--tx3);display:flex;justify-content:space-between}
.rc-folio span{font-family:'DM Mono',monospace;color:var(--tx1);font-weight:600}
.rm2{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:10px}
.kv .k{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;font-weight:500}
.kv .v{font-size:11px;font-weight:600;color:var(--tx1);margin-top:1px;font-family:'DM Mono',monospace}
.rac{display:flex;gap:5px}
.ra{flex:1;padding:6px;border-radius:7px;border:1px solid var(--brd);background:var(--sur2);cursor:pointer;font-size:10px;font-weight:500;color:var(--tx2);text-align:center;transition:all .12s}
.ra:hover{background:var(--sur3)}
.ra.pr{background:var(--acc);color:#111;border-color:var(--acc);font-weight:600}
.ra.dr{color:var(--r);border-color:#fecaca}.ra.dr:hover{background:#fee2e2}
.crm-grid{display:grid;grid-template-columns:280px 1fr;gap:14px;height:calc(100vh - 100px)}
.guest-list{display:flex;flex-direction:column;gap:0;overflow-y:auto}
.guest-row{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--brd);transition:background .1s}
.guest-row:hover{background:var(--sur2)}
.guest-row.on{background:var(--al)}
.gr-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.gr-nm{font-size:13px;font-weight:500;color:var(--tx1)}
.gr-sub{font-size:10px;color:var(--tx3);margin-top:1px}
.gd-hero{padding:20px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:14px}
.gd-av{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0}
.gd-info h2{font-size:16px;font-weight:700;color:var(--tx1)}
.gd-info p{font-size:12px;color:var(--tx3);margin-top:2px}
.gd-tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.gd-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px;border-bottom:1px solid var(--brd)}
.gd-stat{text-align:center}
.gd-stat .v{font-size:18px;font-weight:700;color:var(--tx1);font-family:'DM Mono',monospace}
.gd-stat .l{font-size:10px;color:var(--tx3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.stay-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--brd)}
.stay-row:last-child{border-bottom:none}
.atag{padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700;background:#fee2e2;color:#b91c1c;border:1px solid #fecaca;display:inline-block;margin:1px}
.atag.avoid{background:#fef3c7;color:#92400e;border-color:#fde68a}
.kg{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.tk{background:var(--sur);border:1.5px solid var(--brd);border-radius:12px;overflow:hidden}
.tk.ug{border-color:#fca5a5;background:#fff8f8}
.tk.new-tk{animation:slide-in .3s ease-out}
@keyframes slide-in{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.tkh{padding:9px 12px;border-bottom:1px solid var(--brd);display:flex;align-items:flex-start;justify-content:space-between;background:var(--sur2)}
.tkh .tn{font-size:12px;font-weight:700;color:var(--tx1)}
.tkh .tt{font-size:10px;color:var(--tx3);margin-top:1px}
.tkt{font-size:11px;font-weight:700;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:5px;flex-shrink:0}
.tok{background:#dcfce7;color:#15803d}.twn{background:#fef3c7;color:#a16207}.tlt{background:#fee2e2;color:#b91c1c}
.tcrit{background:#b91c1c;color:#fff;animation:blink .7s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tk-course-banner{padding:4px 12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--brd)}
.tkc-p1{background:#dbeafe;color:#1e40af}
.tkc-p2{background:#fef3c7;color:#92400e}
.tkc-p3{background:#f3e8ff;color:#6d28d9}
.tkc-rs{background:#dcfce7;color:#15803d}
.tk-covers{border-bottom:1px solid var(--brd)}
.tkcover-row{display:flex;align-items:flex-start;gap:6px;padding:5px 12px;border-bottom:1px solid var(--sur3)}
.tkcover-row:last-child{border-bottom:none}
.tkc-lbl{font-size:9px;font-weight:700;color:var(--tx3);min-width:50px}
.tkc-nm{font-size:11px;font-weight:600;color:var(--tx1)}
.tkc-atag{font-size:8px;padding:1px 4px;border-radius:3px;background:#fee2e2;color:#b91c1c;font-weight:700;margin-left:3px}
.tkc-avoid{font-size:8px;padding:1px 4px;border-radius:3px;background:#fef3c7;color:#92400e;font-weight:700;margin-left:2px}
.tkc-note{font-size:9px;color:#a16207;margin-top:1px}
.tkr{display:flex;align-items:flex-start;gap:6px;padding:5px 12px;border-bottom:1px solid var(--sur3)}
.tkr:last-child{border-bottom:none}
.tkq{font-size:12px;font-weight:700;color:var(--at);min-width:16px;font-family:'DM Mono',monospace;padding-top:1px}
.tkn{font-size:11px;color:var(--tx1);flex:1}
.tkn.dn{text-decoration:line-through;color:var(--tx3)}
.tkc2{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--brd);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;margin-top:1px;transition:all .1s}
.tkc2.dn{background:var(--g);border-color:var(--g);color:#fff}
.tk-dish-note{font-size:9px;color:#a16207;background:#fefce8;padding:2px 5px;border-radius:4px;margin-top:2px;display:block}
.tk-allergy-banner{padding:5px 12px;background:#fee2e2;border-top:1px solid #fecaca;font-size:9px;color:#b91c1c;font-weight:600}
.tk-staff-note{padding:4px 12px;background:#fefce8;border-top:1px solid #fde68a;font-size:9px;color:#a16207}
.tkf{padding:7px 12px;border-top:1px solid var(--brd);display:flex;gap:5px;background:var(--sur2)}
.tkb{flex:1;padding:6px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:600;transition:all .12s}
.tks2{background:#dbeafe;color:#1e40af}.tkd2{background:#dcfce7;color:#15803d}
.tkbump{background:var(--acc);color:#111}
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.res-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--brd)}
.res-row:last-child{border-bottom:none}
.res-time{font-size:13px;font-weight:700;color:var(--tx1);font-family:'DM Mono',monospace;min-width:50px}
.res-info{flex:1}
.res-nm{font-size:13px;font-weight:500;color:var(--tx1)}
.res-sub{font-size:10px;color:var(--tx3);margin-top:1px}
.rpg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.br{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.brl{font-size:11px;color:var(--tx2);min-width:75px}
.brt{flex:1;height:5px;background:var(--sur3);border-radius:3px;overflow:hidden}
.brf{height:100%;border-radius:3px;background:var(--acc)}
.brv{font-size:10px;font-family:'DM Mono',monospace;color:var(--tx2);min-width:48px;text-align:right}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--sur);border-radius:14px;padding:24px;width:440px;max-width:90vw;max-height:80vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:700;color:var(--tx1);margin-bottom:16px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.form-row input,.form-row select{width:100%;padding:8px 10px;border:1px solid var(--brd);border-radius:8px;font-size:13px;color:var(--tx1);background:var(--sur2);font-family:'DM Sans',sans-serif}
.form-row input:focus,.form-row select:focus{outline:none;border-color:var(--acc)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.tst{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--sb);color:#e8e4da;padding:9px 20px;border-radius:10px;font-size:12px;font-weight:500;pointer-events:none;opacity:0;transition:opacity .2s;z-index:999;white-space:nowrap}
.tst.sh{opacity:1}

/* MODIFIERS */
.mod-row{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.mod-pill{padding:2px 7px;border-radius:10px;font-size:9px;font-weight:600;border:1px solid var(--brd);background:var(--sur2);cursor:pointer;color:var(--tx2);transition:all .1s}
.mod-pill.on{background:var(--acc);color:#111;border-color:var(--acc)}
.ci-seat{font-size:9px;padding:1px 5px;border-radius:4px;background:#f0ede6;color:#52504a;font-weight:700;margin-left:3px}
.tk-mod-lbl{font-size:8px;padding:1px 4px;border-radius:3px;background:#dbeafe;color:#1e40af;font-weight:700;margin-left:3px}
.tk-seat-lbl{font-size:8px;padding:1px 4px;border-radius:3px;background:#f0ede6;color:#52504a;font-weight:700;margin-left:3px}
/* TABLE TIMER */
.tbl-timer{position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%}
/* WAITER */
.waiter-badge{padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;background:var(--sur3);color:var(--tx2);display:inline-block}
/* PIN */
.pin-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.pin-modal.open{opacity:1;pointer-events:all}
.pin-box{background:var(--sur);border-radius:14px;padding:24px;width:320px;text-align:center}
.pin-box h2{font-size:15px;font-weight:700;color:var(--tx1);margin-bottom:6px}
.pin-display{font-size:28px;font-family:'DM Mono',monospace;letter-spacing:8px;padding:12px;background:var(--sur2);border-radius:8px;margin:12px 0;min-height:54px;color:var(--tx1)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pin-key{padding:14px;border-radius:8px;border:1px solid var(--brd);background:var(--sur2);cursor:pointer;font-size:16px;font-weight:700;color:var(--tx1);transition:all .12s}
.pin-key:hover{background:var(--al);border-color:var(--acc)}
/* DISCOUNT + SPLIT */
.disc-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.disc-btn{padding:5px 10px;border-radius:7px;border:1px solid var(--brd);background:var(--sur2);cursor:pointer;font-size:10px;font-weight:600;color:var(--tx2);transition:all .12s}
.disc-btn:hover{border-color:var(--acc);background:var(--al)}.disc-btn.on{background:var(--acc);color:#111;border-color:var(--acc)}
.split-tabs{display:flex;gap:5px;margin-bottom:10px}
.split-tab{flex:1;padding:7px;border-radius:7px;border:1px solid var(--brd);background:var(--sur2);cursor:pointer;font-size:10px;font-weight:600;color:var(--tx2);text-align:center;transition:all .12s}
.split-tab.on{background:var(--acc);color:#111;border-color:var(--acc)}
.split-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--sur3);font-size:11px}
.tr.disc{color:#15803d}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px}
.eb-panel{position:fixed;top:0;right:0;width:290px;height:100vh;background:var(--sur);border-left:1px solid var(--brd);z-index:150;display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.12)}

/* ── Mobile-responsive helper classes (replaced inline grid styles in JS) ── */
.dash-panels{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.bar-wrap{display:grid;grid-template-columns:1fr 280px;gap:14px;height:calc(100vh - 100px)}
.bar-tickets-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.rep-top-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.rep-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px}
.staff-top-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}

/* ══════════════ MOBILE RESPONSIVE ══════════════ */
@media(max-width:768px){
  body{overflow:auto}
  /* App shell: sidebar moves to bottom nav */
  .app{grid-template-columns:1fr;grid-template-rows:1fr 56px;height:100dvh;min-height:-webkit-fill-available}
  .main{grid-row:1;overflow:hidden;display:flex;flex-direction:column}
  .sb{grid-row:2;flex-direction:row;align-items:center;justify-content:space-around;padding:0 2px;height:56px;overflow-x:auto;overflow-y:hidden;border-top:1px solid rgba(255,255,255,.1)}
  .logo-wrap,.sbsep{display:none}
  .sbot{margin-top:0;flex-direction:row;gap:0}
  .sbb{width:38px;height:46px;flex-shrink:0;gap:1px}
  .sbb span{font-size:7.5px}
  /* Topbar */
  .tb{padding:0 10px;height:44px}
  #tbtl{display:none}
  /* Content area */
  .ct{padding:10px;overflow-y:auto;-webkit-overflow-scrolling:touch}
  /* Dashboard */
  .sg{grid-template-columns:repeat(2,1fr);gap:8px}
  .dash-panels{grid-template-columns:1fr}
  /* Floor */
  .floor-wrap{grid-template-columns:1fr;height:auto}
  .floor-canvas{height:260px;overflow:auto;-webkit-overflow-scrolling:touch}
  /* Bar */
  .bar-wrap{grid-template-columns:1fr;height:auto}
  .bar-tickets-grid{grid-template-columns:repeat(2,1fr)}
  /* KDS */
  .kg{grid-template-columns:1fr}
  /* Hotel */
  .hotel-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  /* Reservations */
  .res-grid{grid-template-columns:1fr}
  /* CRM */
  .crm-grid{grid-template-columns:1fr;height:auto}
  .gd-stats{grid-template-columns:repeat(2,1fr)}
  /* Reports */
  .rep-top-stats{grid-template-columns:repeat(2,1fr)}
  .rep-3col{grid-template-columns:1fr}
  .rpg{grid-template-columns:1fr 1fr}
  /* Staff */
  .staff-top-stats{grid-template-columns:repeat(2,1fr)}
  /* 86-board slides up from bottom on mobile */
  .eb-panel{width:100%;top:auto;bottom:56px;height:60vh;border-left:none;border-top:1px solid var(--brd);box-shadow:0 -4px 24px rgba(0,0,0,.12)}
  /* Modals */
  .pay-box{width:96vw;padding:16px;max-height:85vh;overflow-y:auto}
  .modal{width:96vw;padding:16px;max-height:85vh}
  .pin-box{width:92vw;max-width:320px}
  /* Forms */
  .form-grid{grid-template-columns:1fr}
  /* Misc */
  .rm2{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){
  .bar-tickets-grid{grid-template-columns:1fr}
  .rep-top-stats{grid-template-columns:1fr 1fr}
  .staff-top-stats{grid-template-columns:1fr 1fr}
  .kg{grid-template-columns:1fr}
}

.oli{font-size:12px;font-weight:600;min-width:44px;text-align:right;font-family:'DM Mono',monospace;color:var(--tx1)}

function selectTable(id){aT=id;mpOpenCourse=null;if(vw==='floor')dFloor($('ct'));}
function addCover(d){const seats=getSeating(aT);if(d>0)seats.push({cover:seats.length+1,guestId:null});else if(seats.length>1)seats.pop();dFloor($('ct'));}
function showGSR(idx){const el=$('gsr-'+idx);if(el)el.classList.add('open');}
function searchGuest(q,idx){const el=$('gsr-'+idx);if(!el)return;const filtered=GUESTS.filter(g=>g.nm.toLowerCase().includes(q.toLowerCase()));el.innerHTML=filtered.map(gg=>`<div class="gsr" onclick="assignGuest(${idx},'${gg.id}')"><div class="gsr-av" style="background:${gg.col};color:${gg.tc}">${gg.i}</div><div><div class="gsr-nm">${gg.nm}</div><div class="gsr-sub">${gg.tags[0]||'—'}${gg.allergies.length?` · ⚠️ ${gg.allergies.slice(0,2).join(', ')}`:''}</div></div></div>`).join('');el.classList.add('open');}
function assignGuest(idx,guestId){const seats=getSeating(aT);seats[idx].guestId=parseInt(guestId)||guestId;const g=getGuest(parseInt(guestId)||guestId);if(g){toast(`${g.nm} → Cover ${seats[idx].cover}`+(g.allergies.length?` ⚠️ ${g.allergies.join(', ')}` :''),'#92400e');}if(TABLES.find(t=>t.id===aT)){TABLES.find(t=>t.id===aT).st='occupied';tableTimers[aT]=tableTimers[aT]||0;tableWaiters[aT]=tableWaiters[aT]||currentWaiter;}dFloor($('ct'));}
function clearCover(idx){getSeating(aT)[idx].guestId=null;dFloor($('ct'));}
function openMpicker(courseId){mpOpenCourse=mpOpenCourse===courseId?null:courseId;dFloor($('ct'));}
function setMpCat(cat,courseId){mpCat=cat;mpOpenCourse=courseId;dFloor($('ct'));}
function addCourseItem(courseId,itemId){const item=ALL_ITEMS.find(i=>i.id===itemId);if(!item)return;const c=getOrder(aT).courses[courseId];const ex=c.items.find(i=>i.id===itemId);if(ex)ex.qty++;else c.items.push({...item,qty:1,dishNote:'',mods:[],seatNo:0});toast('Added '+item.nm,'#0d0d0b');dFloor($('ct'));}
function chgCourseItem(courseId,idx,d){const c=getOrder(aT).courses[courseId];c.items[idx].qty+=d;if(c.items[idx].qty<=0)c.items.splice(idx,1);dFloor($('ct'));}
function setDishNote(courseId,idx,v){getOrder(aT).courses[courseId].items[idx].dishNote=v;}
function setCourseNote(courseId,v){getOrder(aT).courses[courseId].courseNote=v;}
function clearCourseOrder(){tableOrders[aT]=undefined;getOrder(aT);toast('Order cleared');dFloor($('ct'));}
function fireCourse(courseId){
  const ord=getOrder(aT);const c=ord.courses[courseId];if(!c.items.length||c.fired)return;c.fired=true;
  const cDef=COURSES.find(x=>x.id===courseId);const seats=getSeating(aT);
  const seating=seats.map(s=>{const g=s.guestId?getGuest(s.guestId):null;return{cover:s.cover,nm:g?g.nm:`Cover ${s.cover}`,allergies:g?g.allergies:[],avoids:g?g.avoids:[],note:g?g.pref:''};});
  const allergyNote=seating.filter(s=>s.allergies.length||s.avoids.length).map(s=>`C${s.cover}: ${[...s.allergies,...s.avoids.map(a=>'✗'+a)].join(' ')}`).join(' | ');
  const ticket={id:`#0${ticketCounter++}`,table:aT,course:courseId,cLabel:cDef.label,kdsCls:aT.startsWith('Room')?'tkc-rs':cDef.kdsCls,waiter:tableWaiters[aT]||currentWaiter,seating,items:c.items.map(i=>({...i,done:false})),courseNote:c.courseNote+(allergyNote?` | ${allergyNote}`:''),mins:0,started:false,urgent:aT.startsWith('Room'),src:aT.startsWith('Room')?'room':'table',isNew:true};
  kdsTickets.unshift(ticket);TABLES.find(t=>t.id===aT).st='occupied';toast(`🔥 ${cDef.label} fired!`,'#15803d');dFloor($('ct'));setTimeout(()=>{ticket.isNew=false;},600);
}
function fireAll(){const ord=getOrder(aT);let n=0;COURSES.forEach(cDef=>{if(ord.courses[cDef.id].items.length&&!ord.courses[cDef.id].fired){fireCourse(cDef.id);n++;}});if(!n)toast('Nothing ready to fire');}

function completePay(method){const total=$('pay-total').textContent;toast((method==='cash'?'💵 Cash':'💳 Card')+' — '+total+' received.',(method==='cash'?'#15803d':'#1e40af'));TABLES.find(t=>t.id===payingTable).st='dirty';tableOrders[payingTable]=undefined;getOrder(payingTable);closePayModal();if(vw==='floor')dFloor($('ct'));}
function searchPayRoom(q){const el=$('pay-room-results');if(!q){el.innerHTML='';return;}const matches=ROOMS.filter(r=>r.st==='occupied'&&(r.n.includes(q)||(r.g&&r.g.toLowerCase().includes(q.toLowerCase()))));el.innerHTML=matches.map(r=>`<div style="padding:6px 10px;cursor:pointer;border:1px solid var(--brd);border-radius:6px;margin-bottom:4px;background:var(--al)" onclick="chargeToRoom('${r.n}','${r.g}')"><div style="font-size:12px;font-weight:600;color:var(--tx1)">Room ${r.n} — ${r.g}</div><div style="font-size:10px;color:var(--tx3)">Balance AED ${r.b}</div></div>`).join('');}

function clearBarOrder(tab){orders_bar[tab]=[];toast('Bar order cleared');dBar($('ct'));}
function sendBarTicket(tab){if(!(orders_bar[tab]||[]).length){toast('No items');return;}toast('Bar ticket sent!');dBar($('ct'));}
function payBar(tab,m){const o=orders_bar[tab]||[];if(!o.length){toast('No items');return;}const tot=o.reduce((s,i)=>s+i.p*i.q,0)*1.05;toast((m==='cash'?'💵':'💳')+' AED '+tot.toFixed(0)+' collected');orders_bar[tab]=[];dBar($('ct'));}
